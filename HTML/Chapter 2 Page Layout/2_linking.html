<!-- Also can be mentioned as linked attributes. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>  <!-- The nav tag will create the navigation bar in your web and you make as much bar as you want. -->

            <a href="home" >Home</a>
            <a href="example/x_About.html">About Us</a>
            <a href="example/projects.html">Projects</a>
            <!-- If the home and About file is present in your folder then you can use and the link will lead it to that code/web on the same page. -->


            <a href="www.google.com">Google me</a>
            <!-- Any other website or url address can also be mentioned here. -->
            <a href="https://t3.ftcdn.net/jpg/07/13/99/74/360_F_713997458_Jt7TouQ8CdgH58E06xoYFhweWbXiLoCy.jpg">My pics</a>
            <!-- My pics link will lead to the lotus pic in the page. -->

            <a href="https://linkedin.com/sushantraj" target="_blank"> My linkedin</a>
            <!-- Now the Linkedin page will be open in new tab just bcz of target = "_blank" attribute. -->


            <!-- Note: We can add any type of content (text,image,etc) in the anchor tab and that thing will later lead to the the reference website or file location. -->

            <!-- Images can also be converted into links like this. -->
             <a href="example/x_About.html"><img src="https://t3.ftcdn.net/jpg/07/13/99/74/360_F_713997458_Jt7TouQ8CdgH58E06xoYFhweWbXiLoCy.jpg" width = 234></a>

        </nav>
    </header>
    

    <hr>

    <!-- Note: We don't only pass links inside the href we can also pass the whole files to download it byy the ser itself. -->
    Click <a href="example/letter.pdf">here</a>, to download the formal letter formal
</body>
</html>
