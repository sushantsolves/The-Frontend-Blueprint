<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
  </head>
  <body>
    <!-- The main opening tag -->
    <main>
      <!-- A page section -->
      <section>
        <!-- A self-contained content -->
        <article>
          <!-- Content goes here -->
        </article>
      </section>
      <!-- Content aside from the main content (e.g. Ads, sidebars) -->
      <aside>
        <!-- Aside content goes here -->
      </aside>
    </main>
    <!-- The main closing tag -->
  </body>
</html>


<!-- Creating a page with this layout is not necessary but it creates a readable and structured layout. and also it is beneficiary for the SEO's  -->
