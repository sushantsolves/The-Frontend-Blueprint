<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR Travels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>WELCOME TO SR TRAVEL AGENCY</h1>
    <h3>.....Dream to Destiny.....</h3>
    <p>We value your life and time, thank you for showing trust on us...  <br>For booking your traveling, please fill up the form- </p>

    <form action="example.xlsx">

        <div>
            <label for="name">Name</label>
            <input type="text" placeholder="Enter Name" required>
        </div>

        <div>
            <label for="age">Age</label>
            <input type="tel" placeholder="Enter Age" required>
        </div>

        <div>
            <label for="no">Number of people</label>
            <input type="num" placeholder="People" required>
        </div>

        <div>
            <label for="arr">Arrival</label>
            <input type="text" placeholder="starting..." required>
        </div>

        <div>
            <label for="dest">Destination</label>
            <input type="text" placeholder="ending..." required>
        </div>

        <div>
            <label for="time">Date</label>
            <input type="date" required>
        </div>

        <div>
            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div>
            <input id="terms" type="checkbox" required>
            <label for="terms">I agree to all the terms and conditions of SR Travels.</label>
        </div>

        <div>
            <label for="comments">Suggestions</label>
            <textarea id="comments" placeholder="Any suggestions or points to mention." rows="3"></textarea>
        </div>

        <button type="submit">Submit Form</button>
    </form>
</body>
</html>
