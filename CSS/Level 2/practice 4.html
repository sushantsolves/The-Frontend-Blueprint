<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Nav Bar Clone 2</title>

    <style>
        *{              /*Not necessary but for industry purposes, good habit */
            padding: 0;
            margin: 0;
        }

        #navbar{
            height: 60px;
            background-color: #0f1111;
        }

        #logo{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 25px;
            color:#e39b0b;
            margin-left: 10px;
            margin-right: 400px;
        }

        #option{
            color:white;
            font-family: Arial, Helvetica, sans-serif;
            margin-left: 50px;
            text-decoration: none;
        }

        #Search{
            margin-left: 50px;
            padding:5px;
        }

        button{
            color: white;
            background-color: #e39b0b;
            padding:5px;
        }
    </style>
</head>
<body>
    <div id="navbar">
        <a href="#" id="logo"><b>amazon.in</b></a>
        <a href="#" id="option">Account</a>
        <a href="#" id="option">My Cart</a>
        <a href="#" id="option">Contact Us</a>
        <a><input id="Search" type="text" placeholder="Search item here"> <button>Search</button></a>
    </div>
</body>
</html>
