<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS level 1</title>
    <style>
        h1{                                       /* method 1 to include style: using style tag */
            color:red;          
        }
    </style>

    <link rel="stylesheet" href="style.css">
</head>
<body>
                                                <!-- del: semicolon in end, not needed in many cases but is shows maturity and good for industry values -->
    <h1>Hello World</h1>

    <h2 style="color:green">Hello, This is Sushant</h2>           <!-- method 2 to include style: Inline -->

    
                                                <!-- Method 3 to include style (Industry relevant): External Stylesheet -> make a separate specific css file for styling and then link it together. -->
     <h3>I am a Software Engineer.</h3> 

     <button>Click Me!</button>
</body>
</html>
